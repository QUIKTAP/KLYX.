<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLYX — بطاقة رقمية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --purple: #7c3aed; --blue: #3b82f6; --cyan: #06b6d4;
    --grad: linear-gradient(135deg, #7c3aed 0%, #3b82f6 50%, #06b6d4 100%);
    --text: #1a1040; --text-soft: #64748b;
    --border: rgba(124,58,237,0.15);
  }
  html, body { min-height: 100%; }
  body {
    background: linear-gradient(160deg, #0d0820, #12082e, #0a1430);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    position: relative; overflow-x: hidden;
  }

  /* BACKGROUND */
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none;
    background-image: linear-gradient(rgba(124,58,237,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(124,58,237,.05) 1px, transparent 1px);
    background-size: 38px 38px;
  }
  .blob {
    position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none;
    animation: drift 12s ease-in-out infinite;
  }
  .b1 { width:450px;height:450px;background:radial-gradient(circle,rgba(124,58,237,.22),transparent 70%);top:-100px;right:-80px; }
  .b2 { width:350px;height:350px;background:radial-gradient(circle,rgba(59,130,246,.16),transparent 70%);bottom:80px;left:-80px;animation-delay:-6s; }
  .b3 { width:250px;height:250px;background:radial-gradient(circle,rgba(6,182,212,.12),transparent 70%);top:50%;right:10%;animation-delay:-3s; }
  @keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(18px,-18px);}}

  /* BRAND TOP */
  .brand-top {
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px; position: relative; z-index: 5;
    animation: up .5s both;
  }
  @keyframes up { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
  .brand-name {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: .85rem;
    background: var(--grad); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
    letter-spacing: .15em;
  }

  /* CARD */
  .card {
    width: 100%; max-width: 380px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 32px; padding: 36px 28px 32px;
    position: relative; z-index: 5; overflow: hidden;
    box-shadow: 0 40px 100px rgba(124,58,237,.35), 0 0 0 1px rgba(124,58,237,.15);
    backdrop-filter: blur(20px);
    animation: up .6s .1s both;
  }
  .card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 15%, rgba(124,58,237,.2), transparent 55%),
                radial-gradient(circle at 80% 85%, rgba(59,130,246,.12), transparent 45%);
    pointer-events: none;
  }
  .card-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); background-size: 28px 28px; }

  /* AVATAR */
  .avatar-wrap {
    display: flex; justify-content: center; margin-bottom: 18px;
    position: relative; z-index: 2;
  }
  .avatar {
    width: 90px; height: 90px; border-radius: 50%;
    background: var(--grad);
    border: 3px solid rgba(255,255,255,.15);
    box-shadow: 0 8px 32px rgba(124,58,237,.45);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
    color: white; overflow: hidden;
    animation: flt 6s ease-in-out infinite;
  }
  @keyframes flt{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* INFO */
  .card-info { text-align: center; margin-bottom: 28px; position: relative; z-index: 2; }
  .card-name { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: white; margin-bottom: 5px; }
  .card-role { font-size: .88rem; color: rgba(255,255,255,.5); margin-bottom: 14px; }
  .card-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(124,58,237,.25); border: 1px solid rgba(124,58,237,.4);
    border-radius: 50px; padding: 4px 14px;
    font-size: .68rem; color: rgba(255,255,255,.7); font-weight: 600;
  }
  .badge-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; animation: blink 1.5s infinite; }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

  /* BUTTONS */
  .actions { display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 2; }
  .action-btn {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
    border-radius: 14px; padding: 13px 16px;
    text-decoration: none; transition: background .2s, transform .2s, box-shadow .2s;
    cursor: pointer;
  }
  .action-btn:hover { background: rgba(255,255,255,.13); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.2); }
  .action-icon {
    width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1.05rem;
  }
  .action-label { color: rgba(255,255,255,.85); font-size: .9rem; font-weight: 600; }
  .action-hint { color: rgba(255,255,255,.4); font-size: .72rem; }
  .action-arrow { margin-right: auto; color: rgba(255,255,255,.3); font-size: .85rem; }

  /* SAVE CONTACT */
  .save-contact-btn {
    width: 100%; padding: 16px;
    background: var(--grad); color: white; border: none;
    border-radius: 50px; font-family: 'Tajawal', sans-serif;
    font-weight: 800; font-size: 1rem; cursor: pointer;
    box-shadow: 0 8px 32px rgba(124,58,237,.5);
    transition: transform .2s, box-shadow .3s;
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .save-contact-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 44px rgba(124,58,237,.65); }

  /* DIVIDER */
  .divider { display: flex; align-items: center; gap: 10px; margin: 14px 0; position: relative; z-index: 2; }
  .div-line { flex: 1; height: 1px; background: rgba(255,255,255,.08); }
  .div-text { font-size: .65rem; color: rgba(255,255,255,.3); letter-spacing: .06em; }

  /* SOCIAL ROW */
  .social-row { display: flex; gap: 10px; justify-content: center; position: relative; z-index: 2; }
  .social-btn {
    width: 46px; height: 46px; border-radius: 13px;
    background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; font-size: 1.15rem;
    transition: background .2s, transform .2s;
  }
  .social-btn:hover { background: rgba(255,255,255,.15); transform: translateY(-3px); }

  /* KLYX FOOTER */
  .klyx-footer {
    margin-top: 24px; position: relative; z-index: 5;
    display: flex; align-items: center; gap: 8px;
    font-size: .72rem; color: rgba(255,255,255,.3);
    animation: up .6s .4s both;
  }
  .klyx-footer a { color: rgba(124,171,237,.5); text-decoration: none; font-weight: 700; }
  .klyx-footer a:hover { color: rgba(124,171,237,.9); }

  /* EMPTY STATE */
  .empty-state { text-align: center; color: rgba(255,255,255,.5); padding: 60px 20px; position: relative; z-index: 5; }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: white; margin-bottom: 8px; }
  .empty-sub { font-size: .88rem; line-height: 1.7; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="brand-top">
  <span class="brand-name">KLYX</span>
</div>

<div id="cardContainer"></div>

<div class="klyx-footer">
  بُنيت بـ ❤ بواسطة <a href="index.html" target="_blank">KLYX</a> — احصل على بطاقتك
</div>

<script>
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function loadCard() {
    const username = getParam('u');
    const container = document.getElementById('cardContainer');

    // Find account by username
    let account = null;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('klyxAccount_')) {
        const data = JSON.parse(localStorage.getItem(key) || '{}');
        if (data.username === username) { account = data; break; }
      }
    }

    // DEMO DATA if no real account or no username param
    if (!account) {
      account = {
        username: username || 'demo',
        card: {
          fullName: 'أحمد بن علي',
          jobTitle: 'مصمم جرافيك & مطور',
          phone: '+216 29 691 046',
          whatsapp: '+216 29 691 046',
          email: 'ahmed@example.com',
          website: 'www.example.com',
          instagram: '@ahmed.design',
          facebook: 'facebook.com/ahmed',
          linkedin: 'linkedin.com/in/ahmed',
          logo: ''
        }
      };
    }

    const c = account.card || {};
    const name = c.fullName || 'KLYX User';
    const initials = name.charAt(0).toUpperCase();

    const avatarHtml = c.logo
      ? `<img src="${c.logo}" alt="${name}" />`
      : initials;

    const actions = [];
    if (c.phone) actions.push(`<a class="action-btn" href="tel:${c.phone}"><div class="action-icon" style="background:rgba(34,197,94,.15);">📱</div><div><div class="action-label">اتصل</div><div class="action-hint">${c.phone}</div></div><span class="action-arrow">←</span></a>`);
    if (c.whatsapp) actions.push(`<a class="action-btn" href="https://wa.me/${c.whatsapp.replace(/\D/g,'')}" target="_blank"><div class="action-icon" style="background:rgba(37,211,102,.15);">💬</div><div><div class="action-label">واتساب</div><div class="action-hint">${c.whatsapp}</div></div><span class="action-arrow">←</span></a>`);
    if (c.email) actions.push(`<a class="action-btn" href="mailto:${c.email}"><div class="action-icon" style="background:rgba(124,58,237,.15);">✉️</div><div><div class="action-label">بريد إلكتروني</div><div class="action-hint">${c.email}</div></div><span class="action-arrow">←</span></a>`);
    if (c.website) actions.push(`<a class="action-btn" href="https://${c.website.replace(/^https?:\/\//,'')}" target="_blank"><div class="action-icon" style="background:rgba(59,130,246,.15);">🌐</div><div><div class="action-label">الموقع الإلكتروني</div><div class="action-hint">${c.website}</div></div><span class="action-arrow">←</span></a>`);

    const socials = [];
    if (c.instagram) socials.push(`<a class="social-btn" href="https://instagram.com/${c.instagram.replace('@','')}" target="_blank" title="Instagram">📸</a>`);
    if (c.facebook) socials.push(`<a class="social-btn" href="https://${c.facebook.replace(/^https?:\/\//,'')}" target="_blank" title="Facebook">👥</a>`);
    if (c.linkedin) socials.push(`<a class="social-btn" href="https://${c.linkedin.replace(/^https?:\/\//,'')}" target="_blank" title="LinkedIn">💼</a>`);

    const hasSocials = socials.length > 0;

    document.title = `${name} — KLYX`;

    container.innerHTML = `
      <div class="card">
        <div class="card-grid"></div>
        <div class="avatar-wrap">
          <div class="avatar">${avatarHtml}</div>
        </div>
        <div class="card-info">
          <div class="card-name">${name}</div>
          ${c.jobTitle ? `<div class="card-role">${c.jobTitle}</div>` : ''}
          <div class="card-badge"><div class="badge-dot"></div>بطاقة KLYX الرقمية</div>
        </div>
        <div class="actions">
          ${actions.join('')}
        </div>
        ${hasSocials ? `
        <div class="divider"><div class="div-line"></div><div class="div-text">تواصل اجتماعي</div><div class="div-line"></div></div>
        <div class="social-row">${socials.join('')}</div>
        ` : ''}
        <div class="divider"><div class="div-line"></div><div class="div-line"></div></div>
        <button class="save-contact-btn" onclick="saveContact()">
          💾 حفظ في جهات الاتصال
        </button>
      </div>
    `;

    // Store card data for vCard download
    window._cardData = c;
    window._cardName = name;
  }

  function saveContact() {
    const c = window._cardData || {};
    const name = window._cardName || 'KLYX User';
    const nameParts = name.split(' ');
    const firstName = nameParts[0] || name;
    const lastName = nameParts.slice(1).join(' ') || '';

    const vcard = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      `FN:${name}`,
      `N:${lastName};${firstName};;;`,
      c.jobTitle ? `TITLE:${c.jobTitle}` : '',
      c.phone ? `TEL;TYPE=CELL:${c.phone}` : '',
      c.whatsapp && c.whatsapp !== c.phone ? `TEL;TYPE=WORK:${c.whatsapp}` : '',
      c.email ? `EMAIL:${c.email}` : '',
      c.website ? `URL:https://${c.website.replace(/^https?:\/\//,'')}` : '',
      c.instagram ? `X-SOCIALPROFILE;type=instagram:${c.instagram}` : '',
      'END:VCARD'
    ].filter(Boolean).join('\n');

    const blob = new Blob([vcard], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name.replace(/\s+/g, '_') + '.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  loadCard();
</script>
</body>
</html>
