<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KLYX Digital Card</title>
<meta name="description" content="KLYX — Digital NFC Business Card">
<meta property="og:title" content="KLYX Digital Card">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --purple:#7c3aed;--grad:linear-gradient(135deg,#7c3aed 0%,#3b82f6 50%,#06b6d4 100%);
  --text:#1a1040;--text-soft:#64748b;
  --card-primary:#7c3aed;--card-secondary:#3b82f6;--card-accent:#06b6d4;
  --card-grad:linear-gradient(135deg,#7c3aed 0%,#3b82f6 50%,#06b6d4 100%);
  --card-glow:rgba(124,58,237,.42);
  --card-bg1:#0d0820;--card-bg2:#12082e;--card-bg3:#0a1628;
}
html,body{min-height:100%;}
body{font-family:'Tajawal',sans-serif;min-height:100vh;background:linear-gradient(160deg,var(--card-bg1),var(--card-bg2),var(--card-bg3));display:flex;flex-direction:column;align-items:center;padding:32px 16px 56px;position:relative;overflow-x:hidden;transition:background 0.6s;}

:focus-visible{outline:2px solid rgba(255,255,255,.6);outline-offset:3px;border-radius:4px;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important;}}

.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:38px 38px;}
.blob{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;animation:drift 14s ease-in-out infinite;}
.b1{width:500px;height:500px;background:radial-gradient(circle,var(--card-glow),transparent 70%);top:-140px;right:-120px;opacity:.7;}
.b2{width:360px;height:360px;background:radial-gradient(circle,rgba(59,130,246,.16),transparent 70%);bottom:60px;left:-100px;animation-delay:-7s;opacity:.7;}
.b3{width:240px;height:240px;background:radial-gradient(circle,rgba(6,182,212,.12),transparent 70%);top:45%;right:8%;animation-delay:-3.5s;}
@keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(18px,-20px);}}

.brand-top{position:relative;z-index:5;margin-bottom:26px;animation:up .5s both;}
@keyframes up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.82rem;background:var(--card-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.15em;}

.card{width:100%;max-width:390px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:34px 26px 30px;position:relative;z-index:5;overflow:hidden;box-shadow:0 40px 100px var(--card-glow),0 0 0 1px rgba(255,255,255,.07);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);animation:up .65s .1s both;transition:box-shadow .6s;}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 28% 14%,rgba(255,255,255,.1),transparent 55%),radial-gradient(circle at 80% 88%,rgba(255,255,255,.05),transparent 45%);pointer-events:none;}
.cg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:26px 26px;}

.av-wrap{display:flex;justify-content:center;margin-bottom:18px;position:relative;z-index:2;}
.avatar{width:92px;height:92px;border-radius:50%;background:var(--card-grad);border:3px solid rgba(255,255,255,.15);box-shadow:0 10px 34px var(--card-glow);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:white;overflow:hidden;animation:flt 7s ease-in-out infinite;transition:background .6s,box-shadow .6s;}
@keyframes flt{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

.card-info{text-align:center;margin-bottom:26px;position:relative;z-index:2;}
.card-name{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:white;margin-bottom:5px;line-height:1.2;}
.card-role{font-size:.88rem;color:rgba(255,255,255,.5);margin-bottom:14px;line-height:1.5;}
.card-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:4px 14px;font-size:.66rem;color:rgba(255,255,255,.65);font-weight:600;}
.badge-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:blink 1.6s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}

.actions{display:flex;flex-direction:column;gap:9px;position:relative;z-index:2;}
.action-btn{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:13px 16px;text-decoration:none;transition:background .2s,transform .2s,box-shadow .2s;}
.action-btn:hover,.action-btn:focus-visible{background:rgba(255,255,255,.13);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.22);}
.action-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.action-body{flex:1;min-width:0;}
.action-label{color:rgba(255,255,255,.88);font-size:.9rem;font-weight:700;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.action-hint{color:rgba(255,255,255,.38);font-size:.7rem;direction:ltr;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.action-arrow{color:rgba(255,255,255,.28);font-size:.85rem;flex-shrink:0;}
[dir="rtl"] .action-arrow{transform:scaleX(-1);}

.divider{display:flex;align-items:center;gap:10px;margin:14px 0;position:relative;z-index:2;}
.div-line{flex:1;height:1px;background:rgba(255,255,255,.08);}
.div-text{font-size:.62rem;color:rgba(255,255,255,.28);letter-spacing:.06em;}

.social-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;position:relative;z-index:2;}
.social-btn{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:1.1rem;transition:background .2s,transform .2s,box-shadow .2s;}
.social-btn:hover,.social-btn:focus-visible{background:rgba(255,255,255,.16);transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.2);}

.cta-row{display:flex;gap:10px;margin-top:18px;position:relative;z-index:2;}
.cta-save{flex:1;padding:14px;background:var(--card-grad);color:white;border:none;border-radius:50px;font-family:'Tajawal',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;box-shadow:0 8px 30px var(--card-glow);transition:transform .2s,box-shadow .3s,background .5s;display:flex;align-items:center;justify-content:center;gap:7px;}
.cta-save:hover{transform:translateY(-3px);box-shadow:0 14px 44px var(--card-glow);}
.cta-share{width:52px;height:52px;flex-shrink:0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.15rem;transition:background .2s,transform .2s;color:white;}
.cta-share:hover{background:rgba(255,255,255,.2);transform:translateY(-3px);}

#shareToast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);backdrop-filter:blur(16px);border-radius:50px;padding:10px 22px;font-size:.82rem;font-weight:700;color:#86efac;opacity:0;transition:opacity .3s,transform .3s;z-index:9999;pointer-events:none;white-space:nowrap;}
#shareToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.klyx-footer{margin-top:24px;position:relative;z-index:5;display:flex;align-items:center;gap:7px;font-size:.72rem;color:rgba(255,255,255,.25);animation:up .6s .4s both;}
.klyx-footer a{color:rgba(124,171,237,.45);text-decoration:none;font-weight:700;}
.klyx-footer a:hover{color:rgba(124,171,237,.85);}
.empty-state{text-align:center;color:rgba(255,255,255,.4);padding:60px 20px;position:relative;z-index:5;animation:up .5s .2s both;}

@media(max-width:430px){body{padding:24px 12px 48px;}.card{border-radius:26px;padding:28px 20px 24px;}.avatar{width:80px;height:80px;}.card-name{font-size:1.3rem;}}
</style>
</head>
<body>
<div class="bg-grid" aria-hidden="true"></div>
<div class="blob b1" aria-hidden="true"></div>
<div class="blob b2" aria-hidden="true"></div>
<div class="blob b3" aria-hidden="true"></div>

<div class="brand-top"><span class="brand-name" aria-label="KLYX">KLYX</span></div>

<main id="cardWrap" aria-live="polite"></main>

<div class="klyx-footer">
  <span id="footerTxt">بُنيت بـ ❤ بواسطة</span>
  <a href="index.html" target="_blank" rel="noopener">KLYX</a>
  &nbsp;·&nbsp;
  <a href="index.html#products" target="_blank" rel="noopener" id="footerGet">احصل على بطاقتك</a>
</div>

<div id="shareToast" role="status" aria-live="polite"><span id="toastMsg">تم النسخ!</span></div>

<script src="i18n.js"></script>
<script>
(function(){
  'use strict';

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ KlyxI18n.init(); });
  } else {
    KlyxI18n.init();
  }

  function getParam(name) { return new URLSearchParams(window.location.search).get(name); }
  var username = getParam('u') || 'demo';

  /* SAFE: strip any non-alphanumeric from username to prevent path traversal */
  username = username.replace(/[^a-z0-9_\-]/gi,'').substring(0,64) || 'demo';

  function findAccount(uname) {
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      if (key && key.startsWith('klyxAccount_')) {
        try {
          var data = JSON.parse(localStorage.getItem(key) || '{}');
          if (data.username === uname) return data;
        } catch(e){}
      }
    }
    return null;
  }

  var DEMO = {
    username:'demo',
    card:{fullName:'أحمد بن علي',jobTitle:'مصمم جرافيك & مطور رقمي',phone:'+216 29 691 046',whatsapp:'+216 29 691 046',email:'ahmed@klyxtn.com',website:'www.klyxtn.com',instagram:'@klyx.tn',facebook:'facebook.com/klyxtn',linkedin:'linkedin.com/company/klyx',tiktok:'@klyx.tn5',twitter:'',youtube:'',snapchat:'',telegram:'',github:'',behance:'',logo:'',theme:'purple'}
  };

  var CONTACT_LINKS = [
    {id:'phone',   icon:'📱',bg:'rgba(34,197,94,.15)',  href:function(v){return 'tel:'+v;},                                 label_key:'card_call',    hint:function(v){return v;}},
    {id:'whatsapp',icon:'💬',bg:'rgba(37,211,102,.15)', href:function(v){return 'https://wa.me/'+v.replace(/\D/g,'');},      label_key:'card_wa',      hint:function(v){return v;}},
    {id:'email',   icon:'✉️',bg:'rgba(124,58,237,.15)', href:function(v){return 'mailto:'+encodeURIComponent(v);},           label_key:'card_email',   hint:function(v){return v;}},
    {id:'website', icon:'🌐',bg:'rgba(59,130,246,.15)', href:function(v){return 'https://'+v.replace(/^https?:\/\//,'');},   label_key:'card_website', hint:function(v){return v;}},
  ];

  var SOCIAL_LINKS = [
    {id:'instagram',icon:'📸',href:function(v){return 'https://instagram.com/'+v.replace('@','');}             ,title:'Instagram'},
    {id:'facebook', icon:'👥',href:function(v){return 'https://'+v.replace(/^https?:\/\//,'');}                ,title:'Facebook'},
    {id:'linkedin', icon:'💼',href:function(v){return 'https://'+v.replace(/^https?:\/\//,'');}                ,title:'LinkedIn'},
    {id:'tiktok',   icon:'🎵',href:function(v){return 'https://tiktok.com/'+v;}                                ,title:'TikTok'},
    {id:'twitter',  icon:'𝕏', href:function(v){return 'https://twitter.com/'+v.replace('@','');}              ,title:'X / Twitter'},
    {id:'youtube',  icon:'▶️',href:function(v){return 'https://'+v.replace(/^https?:\/\//,'');}                ,title:'YouTube'},
    {id:'snapchat', icon:'👻',href:function(v){return 'https://snapchat.com/add/'+v.replace('@','');}          ,title:'Snapchat'},
    {id:'telegram', icon:'✈️',href:function(v){return 'https://t.me/'+v.replace('@','').replace('+','');}      ,title:'Telegram'},
    {id:'github',   icon:'🐙',href:function(v){return 'https://'+v.replace(/^https?:\/\//,'');}                ,title:'GitHub'},
    {id:'behance',  icon:'🅱', href:function(v){return 'https://'+v.replace(/^https?:\/\//,'');}               ,title:'Behance'},
  ];

  function applyTheme(themeKey) {
    var key = themeKey || (function(){ try { return localStorage.getItem('klyxCardTheme'); } catch(e){ return null; } })() || 'purple';
    if (!window.KLYX_THEMES) return;
    var th = KLYX_THEMES[key] || KLYX_THEMES.purple;
    var r = document.documentElement;
    r.style.setProperty('--card-primary',   th.primary);
    r.style.setProperty('--card-secondary', th.secondary);
    r.style.setProperty('--card-accent',    th.accent);
    r.style.setProperty('--card-grad',      th.grad);
    r.style.setProperty('--card-glow',      th.glow);
    r.style.setProperty('--card-bg1',       th.bg1);
    r.style.setProperty('--card-bg2',       th.bg2);
    r.style.setProperty('--card-bg3',       th.bg3);
    document.body.style.background = 'linear-gradient(160deg,'+th.bg1+','+th.bg2+','+th.bg3+')';
    var blob = document.querySelector('.blob.b1');
    if (blob) blob.style.background = 'radial-gradient(circle,'+th.glow+',transparent 70%)';
  }

  /**
   * SAFE DOM construction — NEVER use innerHTML with user data.
   * All user-supplied strings go through textContent only.
   */
  function renderCard() {
    var account = findAccount(username) || DEMO;
    var c = account.card || {};

    var displayName = (c.fullName || 'KLYX').substring(0, 100);
    var displayRole = (c.jobTitle || '').substring(0, 100);

    /* Update page title safely */
    document.title = displayName + ' — KLYX Digital Card';

    /* Update OG meta if possible */
    var metaOg = document.querySelector('meta[property="og:title"]');
    if (metaOg) metaOg.setAttribute('content', displayName + ' — KLYX Digital Card');

    applyTheme(c.theme || 'purple');

    var t = function(k){ return KlyxI18n.t(k); };
    var initials = displayName.charAt(0).toUpperCase();

    var wrap = document.getElementById('cardWrap');
    wrap.innerHTML = ''; /* safe — no user data in this empty string */

    /* Build card using DOM API — NO user data in innerHTML */
    var card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('aria-label', displayName + ' — ' + t('card_badge'));

    /* Grid bg */
    var cg = document.createElement('div'); cg.className = 'cg'; cg.setAttribute('aria-hidden','true');
    card.appendChild(cg);

    /* Avatar */
    var avWrap = document.createElement('div'); avWrap.className = 'av-wrap'; avWrap.setAttribute('aria-hidden','true');
    var av = document.createElement('div'); av.className = 'avatar';
    if (c.logo && /^data:image\/(png|jpeg|jpg|gif|webp|svg\+xml);base64,/.test(c.logo)) {
      var img = document.createElement('img');
      img.src = c.logo; /* validated: only base64 data URIs */
      img.alt = displayName;
      img.style.width = '100%'; img.style.height = '100%';
      img.style.objectFit = 'cover'; img.style.borderRadius = '50%';
      av.appendChild(img);
    } else {
      av.textContent = initials;
    }
    avWrap.appendChild(av); card.appendChild(avWrap);

    /* Info */
    var info = document.createElement('div'); info.className = 'card-info';
    var nameEl = document.createElement('div'); nameEl.className = 'card-name';
    nameEl.textContent = displayName; /* textContent — XSS safe */
    info.appendChild(nameEl);
    if (displayRole) {
      var roleEl = document.createElement('div'); roleEl.className = 'card-role';
      roleEl.textContent = displayRole;
      info.appendChild(roleEl);
    }
    var badge = document.createElement('div'); badge.className = 'card-badge';
    var bdot = document.createElement('div'); bdot.className = 'badge-dot';
    badge.appendChild(bdot);
    var badgeTxt = document.createElement('span');
    badgeTxt.textContent = t('card_badge');
    badge.appendChild(badgeTxt);
    info.appendChild(badge);
    card.appendChild(info);

    /* Contact actions */
    var actDiv = document.createElement('div'); actDiv.className = 'actions';
    var hasActions = false;
    CONTACT_LINKS.forEach(function(cfg){
      var val = (c[cfg.id] || '').trim().substring(0, 200);
      if (!val) return;
      hasActions = true;
      var a = document.createElement('a');
      a.className = 'action-btn';
      a.href = cfg.href(val);
      a.target = '_blank'; a.rel = 'noopener noreferrer';
      var ico = document.createElement('div'); ico.className = 'action-icon';
      ico.style.background = cfg.bg; ico.setAttribute('aria-hidden','true');
      ico.textContent = cfg.icon;
      a.appendChild(ico);
      var body = document.createElement('div'); body.className = 'action-body';
      var lbl = document.createElement('span'); lbl.className = 'action-label';
      lbl.textContent = t(cfg.label_key);
      var hint = document.createElement('span'); hint.className = 'action-hint';
      hint.textContent = cfg.hint(val);
      body.appendChild(lbl); body.appendChild(hint); a.appendChild(body);
      var arr = document.createElement('span'); arr.className = 'action-arrow'; arr.setAttribute('aria-hidden','true'); arr.textContent = '→';
      a.appendChild(arr);
      actDiv.appendChild(a);
    });
    if (!hasActions) {
      var empty = document.createElement('p');
      empty.style.cssText = 'color:rgba(255,255,255,.3);font-size:.8rem;text-align:center;padding:12px 0;';
      empty.textContent = '—';
      actDiv.appendChild(empty);
    }
    card.appendChild(actDiv);

    /* Socials */
    var socials = SOCIAL_LINKS.filter(function(cfg){ return (c[cfg.id] || '').trim().length > 0; });
    if (socials.length > 0) {
      var div = document.createElement('div'); div.className = 'divider'; div.setAttribute('aria-hidden','true');
      var dl = document.createElement('div'); dl.className = 'div-line'; div.appendChild(dl);
      var dt = document.createElement('div'); dt.className = 'div-text'; dt.textContent = 'SOCIAL'; div.appendChild(dt);
      var dl2 = document.createElement('div'); dl2.className = 'div-line'; div.appendChild(dl2);
      card.appendChild(div);
      var row = document.createElement('div'); row.className = 'social-row'; row.setAttribute('aria-label', 'وسائل التواصل الاجتماعي');
      socials.forEach(function(cfg){
        var val = (c[cfg.id] || '').trim().substring(0, 200);
        var a = document.createElement('a'); a.className = 'social-btn';
        a.href = cfg.href(val); a.target = '_blank'; a.rel = 'noopener noreferrer';
        a.setAttribute('aria-label', cfg.title); a.title = cfg.title;
        a.textContent = cfg.icon;
        row.appendChild(a);
      });
      card.appendChild(row);
    }

    /* CTA row */
    var ctaRow = document.createElement('div'); ctaRow.className = 'cta-row';
    var saveBtn = document.createElement('button'); saveBtn.className = 'cta-save';
    saveBtn.textContent = t('card_save');
    saveBtn.addEventListener('click', saveContact);
    var shareBtn = document.createElement('button'); shareBtn.className = 'cta-share';
    shareBtn.setAttribute('aria-label', t('card_share'));
    shareBtn.textContent = '↗';
    shareBtn.addEventListener('click', shareCard);
    ctaRow.appendChild(saveBtn); ctaRow.appendChild(shareBtn);
    card.appendChild(ctaRow);

    wrap.appendChild(card);
    window._cardData = c;
    window._cardName = displayName;
    window._cardUser = username;
  }

  function saveContact() {
    var c = window._cardData || {};
    var name = window._cardName || 'KLYX';
    var parts = name.split(' ');
    var lines = ['BEGIN:VCARD','VERSION:3.0',
      'FN:' + name,
      'N:' + parts.slice(1).join(' ') + ';' + parts[0] + ';;;',
    ];
    if (c.jobTitle) lines.push('TITLE:' + c.jobTitle);
    if (c.phone)    lines.push('TEL;TYPE=CELL:' + c.phone);
    if (c.whatsapp && c.whatsapp !== c.phone) lines.push('TEL;TYPE=WORK:' + c.whatsapp);
    if (c.email)    lines.push('EMAIL:' + c.email);
    if (c.website)  lines.push('URL:https://' + c.website.replace(/^https?:\/\//,''));
    if (c.instagram) lines.push('X-SOCIALPROFILE;type=instagram:' + c.instagram);
    if (c.linkedin)  lines.push('X-SOCIALPROFILE;type=linkedin:' + c.linkedin);
    lines.push('NOTE:KLYX NFC Digital Card — klyxtn.com','END:VCARD');
    var vcard = lines.join('\r\n');
    var blob = new Blob([vcard], {type:'text/vcard;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = name.replace(/\s+/g,'_') + '.vcf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function shareCard() {
    var url = window.location.href;
    var name = window._cardName || 'KLYX';
    if (navigator.share) {
      navigator.share({title: name + ' — KLYX', url: url}).catch(function(){});
    } else {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function(){
          showToast(KlyxI18n.t('card_shared'));
        }).catch(function(){
          showToast(KlyxI18n.t('card_shared'));
        });
      } else {
        showToast(KlyxI18n.t('card_shared'));
      }
    }
  }

  function showToast(msg) {
    var toast = document.getElementById('shareToast');
    document.getElementById('toastMsg').textContent = msg;
    toast.classList.add('show');
    setTimeout(function(){ toast.classList.remove('show'); }, 2500);
  }

  function updateFooterLang() {
    document.getElementById('footerTxt').textContent = KlyxI18n.t('card_footer');
    document.getElementById('footerGet').textContent = KlyxI18n.t('card_get');
  }

  document.addEventListener('DOMContentLoaded', function(){
    KlyxI18n.init();
    renderCard();
    updateFooterLang();
  });

  document.addEventListener('klyxLangChanged', function(){
    renderCard();
    updateFooterLang();
  });

})();
</script>
</body>
</html>
