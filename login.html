<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLYX — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --white: #ffffff; --off-white: #f8f7ff;
    --purple: #7c3aed; --blue: #3b82f6; --cyan: #06b6d4;
    --grad: linear-gradient(135deg, #7c3aed 0%, #3b82f6 50%, #06b6d4 100%);
    --grad-soft: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(59,130,246,0.07));
    --text: #1a1040; --text-soft: #64748b;
    --border: rgba(124,58,237,0.15);
  }
  body {
    background: linear-gradient(155deg, #0d0820 0%, #12082e 50%, #0a1628 100%);
    color: var(--text); font-family: 'Tajawal', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(124,58,237,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,.06) 1px, transparent 1px);
    background-size: 44px 44px;
  }
  .blob {
    position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none;
    animation: drift 10s ease-in-out infinite;
  }
  .b1 { width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.2),transparent 70%);top:-150px;right:-100px; }
  .b2 { width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,.15),transparent 70%);bottom:-100px;left:0;animation-delay:-5s; }
  @keyframes drift { 0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-20px);} }

  .login-card {
    background: rgba(255,255,255,.97);
    border-radius: 32px; padding: 52px 44px;
    width: 92%; max-width: 440px;
    box-shadow: 0 40px 120px rgba(124,58,237,.4), 0 0 0 1px rgba(124,58,237,.15);
    position: relative; z-index: 10;
    animation: up .7s cubic-bezier(.34,1.3,.64,1) both;
  }
  @keyframes up { from{opacity:0;transform:translateY(40px) scale(.95);} to{opacity:1;transform:translateY(0) scale(1);} }

  .login-logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem;
    background: var(--grad); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
    text-align: center; margin-bottom: 8px;
  }
  .login-tagline { text-align: center; font-size: .82rem; color: var(--text-soft); margin-bottom: 36px; }
  .login-title { font-family: 'Syne', sans-serif; font-size: 1.55rem; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .login-sub { font-size: .86rem; color: var(--text-soft); margin-bottom: 32px; line-height: 1.6; }

  .field-wrap { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
  .field-label { font-size: .8rem; font-weight: 600; color: var(--text); }
  .field-input-wrap { position: relative; }
  .field {
    width: 100%; padding: 14px 16px; padding-right: 44px;
    border: 1.5px solid rgba(124,58,237,.2);
    border-radius: 14px; font-family: 'Tajawal', sans-serif;
    font-size: .93rem; color: var(--text); outline: none; background: #fafaff;
    transition: border-color .2s, box-shadow .2s;
  }
  .field:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,.1); background: white; }
  .field::placeholder { color: #bbb; }
  .field-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }

  .error-msg { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); border-radius: 10px; padding: 10px 14px; font-size: .82rem; color: #dc2626; margin-bottom: 16px; display: none; }

  .btn-login {
    width: 100%; padding: 16px;
    background: var(--grad); color: white; border: none;
    border-radius: 50px; font-family: 'Tajawal', sans-serif;
    font-weight: 700; font-size: 1rem; cursor: pointer;
    box-shadow: 0 8px 28px rgba(124,58,237,.42);
    transition: transform .2s, box-shadow .3s;
    margin-top: 8px;
  }
  .btn-login:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(124,58,237,.55); }

  .login-footer { text-align: center; margin-top: 24px; font-size: .8rem; color: var(--text-soft); }
  .login-footer a { color: var(--purple); font-weight: 700; text-decoration: none; }
  .login-footer a:hover { text-decoration: underline; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider-line { flex: 1; height: 1px; background: rgba(124,58,237,.12); }
  .divider-text { font-size: .72rem; color: var(--text-soft); white-space: nowrap; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="login-card">
  <div class="login-logo">KLYX</div>
  <div class="login-tagline">مساحتك الرقمية الخاصة</div>

  <div class="login-title">أهلاً بعودتك 👋</div>
  <div class="login-sub">ادخل على حسابك لإدارة بطاقتك الرقمية</div>

  <div class="error-msg" id="errorMsg">البريد الإلكتروني أو كلمة المرور غير صحيحة</div>

  <div class="field-wrap">
    <label class="field-label">البريد الإلكتروني</label>
    <div class="field-input-wrap">
      <input class="field" id="email" type="email" dir="ltr" placeholder="your@email.com" />
      <span class="field-icon">✉️</span>
    </div>
  </div>

  <div class="field-wrap">
    <label class="field-label">كلمة المرور</label>
    <div class="field-input-wrap">
      <input class="field" id="password" type="password" dir="ltr" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
      <span class="field-icon">🔑</span>
    </div>
  </div>

  <button class="btn-login" onclick="login()">تسجيل الدخول</button>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">أو</div>
    <div class="divider-line"></div>
  </div>

  <div class="login-footer">
    ليس لديك حساب؟ <a href="index.html#products">اطلب بطاقتك الآن ←</a>
  </div>
</div>

<script>
  // Check if already logged in
  const currentUser = localStorage.getItem('klyxCurrentUser');
  if (currentUser) window.location.href = 'dashboard.html';

  function login() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');

    if (!email || !pass) { err.style.display = 'block'; err.textContent = 'من فضلك أدخل بريدك وكلمة مرورك'; return; }

    const stored = localStorage.getItem('klyxAccount_' + email);
    if (!stored) { err.style.display = 'block'; err.textContent = 'لا يوجد حساب بهذا البريد الإلكتروني'; return; }

    const account = JSON.parse(stored);
    if (account.password !== pass) { err.style.display = 'block'; err.textContent = 'كلمة المرور غير صحيحة'; return; }

    localStorage.setItem('klyxCurrentUser', email);
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
