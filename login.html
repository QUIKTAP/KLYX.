<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLYX — تسجيل الدخول</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --purple:#7c3aed;--blue:#3b82f6;--cyan:#06b6d4;
  --grad:linear-gradient(135deg,#7c3aed 0%,#3b82f6 50%,#06b6d4 100%);
  --text:#1a1040;--text-soft:#64748b;--border:rgba(124,58,237,.15);
  --focus-ring:0 0 0 3px rgba(124,58,237,.35);
}
html,body{min-height:100%;}
body{background:linear-gradient(145deg,#0d0820 0%,#12082e 55%,#0a1430 100%);font-family:'Tajawal',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;overflow-x:hidden;}

:focus-visible{outline:2px solid rgba(124,58,237,.7);outline-offset:3px;border-radius:4px;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important;}}

.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(124,58,237,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.06) 1px,transparent 1px);background-size:44px 44px;}
.blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;animation:drift 12s ease-in-out infinite;}
.b1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.22),transparent 70%);top:-140px;right:-100px;}
.b2{width:380px;height:380px;background:radial-gradient(circle,rgba(59,130,246,.14),transparent 70%);bottom:-100px;left:-80px;animation-delay:-6s;}
.b3{width:260px;height:260px;background:radial-gradient(circle,rgba(6,182,212,.1),transparent 70%);top:50%;right:12%;animation-delay:-3s;}
@keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(18px,-18px);}}

#langBar{position:fixed;top:20px;right:24px;z-index:50;}
.klyx-lang-switcher{display:flex;align-items:center;gap:6px;}
.lang-btn{background:transparent;border:1.5px solid rgba(124,58,237,.4);color:rgba(255,255,255,.7);font-family:'Tajawal',sans-serif;font-weight:700;font-size:.72rem;padding:4px 11px;border-radius:50px;cursor:pointer;transition:background .2s,color .2s,border-color .2s;}
.lang-btn.active,.lang-btn:hover{background:var(--grad);color:#fff;border-color:transparent;}

.login-card{background:rgba(255,255,255,.97);border-radius:32px;padding:52px 44px;width:92%;max-width:440px;box-shadow:0 40px 120px rgba(124,58,237,.38),0 0 0 1px rgba(124,58,237,.12);position:relative;z-index:10;animation:up .7s cubic-bezier(.34,1.3,.64,1) both;}
@keyframes up{from{opacity:0;transform:translateY(40px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}

.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:6px;}
.login-tagline{text-align:center;font-size:.82rem;color:var(--text-soft);margin-bottom:36px;}
.login-title{font-family:'Syne',sans-serif;font-size:1.55rem;font-weight:800;color:var(--text);margin-bottom:5px;}
.login-sub{font-size:.85rem;color:var(--text-soft);margin-bottom:28px;line-height:1.6;}

.err-box{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:10px 14px;font-size:.82rem;color:#dc2626;margin-bottom:16px;display:none;animation:up .3s both;}
.err-box.show{display:block;}

.fw{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.fl{font-size:.78rem;font-weight:600;color:var(--text);}
.fi-wrap{position:relative;}
.fi{width:100%;padding:13px 44px 13px 16px;border:1.5px solid rgba(124,58,237,.2);border-radius:14px;font-family:'Tajawal',sans-serif;font-size:.93rem;color:var(--text);outline:none;background:#fafaff;transition:border-color .2s,box-shadow .2s;}
.fi:focus{border-color:var(--purple);box-shadow:var(--focus-ring);background:white;}
.fi::placeholder{color:#bbb;}
.fi[aria-invalid="true"]{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.12);}
.fi-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;}
.pwd-toggle{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-soft);font-size:.85rem;padding:4px;}

/* Throttle indicator */
.lockout-bar{height:3px;background:rgba(239,68,68,.15);border-radius:2px;margin-bottom:14px;overflow:hidden;display:none;}
.lockout-bar.show{display:block;}
.lockout-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f97316);border-radius:2px;transition:width 1s linear;}

.btn-login{width:100%;padding:15px;background:var(--grad);color:white;border:none;border-radius:50px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;box-shadow:0 8px 28px rgba(124,58,237,.42);transition:transform .2s,box-shadow .3s,opacity .2s;margin-top:6px;}
.btn-login:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(124,58,237,.55);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.div-line{flex:1;height:1px;background:rgba(124,58,237,.12);}
.div-text{font-size:.7rem;color:var(--text-soft);}

.footer-link{text-align:center;font-size:.8rem;color:var(--text-soft);}
.footer-link a{color:var(--purple);font-weight:700;text-decoration:none;}
.footer-link a:hover{text-decoration:underline;}

.bottom-brand{margin-top:28px;position:relative;z-index:10;font-size:.72rem;color:rgba(255,255,255,.3);}
.bottom-brand a{color:rgba(124,171,237,.5);text-decoration:none;font-weight:700;}
</style>
</head>
<body>
<div class="bg-grid" aria-hidden="true"></div>
<div class="blob b1" aria-hidden="true"></div>
<div class="blob b2" aria-hidden="true"></div>
<div class="blob b3" aria-hidden="true"></div>

<div id="langBar" role="region" aria-label="اختيار اللغة"></div>

<main class="login-card">
  <div class="login-logo" aria-label="KLYX">KLYX</div>
  <p class="login-tagline" data-i18n="login_tagline">مساحتك الرقمية الخاصة</p>

  <h1 class="login-title" data-i18n="login_title">أهلاً بعودتك 👋</h1>
  <p class="login-sub" data-i18n="login_sub">ادخل على حسابك لإدارة بطاقتك الرقمية</p>

  <div class="lockout-bar" id="lockoutBar" role="status" aria-live="polite">
    <div class="lockout-fill" id="lockoutFill" style="width:100%"></div>
  </div>
  <div class="err-box" id="errBox" role="alert"></div>

  <div class="fw">
    <label class="fl" for="email" data-i18n="login_email">البريد الإلكتروني</label>
    <div class="fi-wrap">
      <input class="fi" id="email" type="email" dir="ltr" autocomplete="email" maxlength="150" placeholder="your@email.com" required aria-required="true" />
      <span class="fi-icon" aria-hidden="true">✉️</span>
    </div>
  </div>

  <div class="fw">
    <label class="fl" for="password" data-i18n="login_pwd">كلمة المرور</label>
    <div class="fi-wrap">
      <input class="fi" id="password" type="password" dir="ltr" autocomplete="current-password" maxlength="128" placeholder="••••••••" required aria-required="true" />
      <button type="button" id="pwdToggle" class="pwd-toggle" aria-label="إظهار/إخفاء كلمة المرور">👁</button>
      <span class="fi-icon" aria-hidden="true" style="right:40px;">🔑</span>
    </div>
  </div>

  <button class="btn-login" id="loginBtn" type="button" data-i18n="login_btn">تسجيل الدخول</button>

  <div class="divider"><div class="div-line"></div><div class="div-text">أو</div><div class="div-line"></div></div>

  <div class="footer-link">
    <span data-i18n="login_no_account">ليس لديك حساب؟</span>
    <a href="index.html#products" data-i18n="login_no_account_link"> اطلب بطاقتك الآن ←</a>
  </div>
</main>

<div class="bottom-brand">
  <a href="index.html">KLYX</a> · NFC Digital Cards
</div>

<script src="i18n.js"></script>
<script>
(function(){
  'use strict';

  /* ── Brute-force protection (client-side, 5 attempts → 30s lockout) ── */
  var MAX_ATTEMPTS = 5;
  var LOCKOUT_MS   = 30000;
  var _attempts    = 0;
  var _lockedUntil = 0;
  var _lockoutTimer = null;

  function isLocked() { return Date.now() < _lockedUntil; }

  function startLockout() {
    _lockedUntil = Date.now() + LOCKOUT_MS;
    var bar  = document.getElementById('lockoutBar');
    var fill = document.getElementById('lockoutFill');
    var btn  = document.getElementById('loginBtn');
    bar.classList.add('show');
    btn.disabled = true;
    var remaining = LOCKOUT_MS;
    fill.style.width = '100%';
    _lockoutTimer = setInterval(function(){
      remaining -= 1000;
      fill.style.width = Math.max(0, (remaining / LOCKOUT_MS) * 100) + '%';
      if (remaining <= 0) {
        clearInterval(_lockoutTimer);
        _attempts = 0;
        _lockedUntil = 0;
        bar.classList.remove('show');
        btn.disabled = false;
        clearError();
      }
    }, 1000);
  }

  /* ── Hash comparison (must match payment.html hash method) ── */
  async function hashPassword(pwd) {
    if (window.crypto && window.crypto.subtle) {
      var enc = new TextEncoder();
      var buf = await window.crypto.subtle.digest('SHA-256', enc.encode(pwd));
      return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
    }
    return btoa(unescape(encodeURIComponent(pwd)));
  }

  function showErr(msg) {
    var box = document.getElementById('errBox');
    box.textContent = msg;
    box.classList.add('show');
  }
  function clearError() {
    var box = document.getElementById('errBox');
    box.textContent = '';
    box.classList.remove('show');
  }

  function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

  async function doLogin() {
    clearError();
    if (isLocked()) return;

    var email = document.getElementById('email').value.trim();
    var pass  = document.getElementById('password').value;
    var btn   = document.getElementById('loginBtn');

    if (!email || !isValidEmail(email)) { showErr(KlyxI18n.t('login_err_empty')); document.getElementById('email').focus(); return; }
    if (!pass) { showErr(KlyxI18n.t('login_err_empty')); document.getElementById('password').focus(); return; }

    btn.disabled = true;
    btn.textContent = '...';

    try {
      var stored;
      try { stored = localStorage.getItem('klyxAccount_' + email); } catch(e){ stored = null; }

      if (!stored) {
        _attempts++;
        if (_attempts >= MAX_ATTEMPTS) startLockout();
        showErr(KlyxI18n.t('login_err_nouser'));
        document.getElementById('email').setAttribute('aria-invalid','true');
        btn.disabled = false;
        btn.textContent = KlyxI18n.t('login_btn');
        return;
      }

      var account;
      try { account = JSON.parse(stored); } catch(e){ account = null; }
      if (!account) { showErr(KlyxI18n.t('login_err')); btn.disabled=false; btn.textContent=KlyxI18n.t('login_btn'); return; }

      var inputHash = await hashPassword(pass);

      /* Compare hash — account may have pwdHash (new) or password (legacy plaintext) */
      var match = false;
      if (account.pwdHash) {
        match = (inputHash === account.pwdHash);
      } else if (account.password) {
        /* Legacy: compare plaintext but migrate to hash immediately */
        match = (pass === account.password);
        if (match) {
          account.pwdHash = inputHash;
          delete account.password;
          try { localStorage.setItem('klyxAccount_' + email, JSON.stringify(account)); } catch(e){}
        }
      }

      if (!match) {
        _attempts++;
        if (_attempts >= MAX_ATTEMPTS) startLockout();
        else {
          var remaining = MAX_ATTEMPTS - _attempts;
          showErr(KlyxI18n.t('login_err') + ' (' + remaining + ' ' + (KlyxI18n.t('login_attempts_left')||'محاولات متبقية') + ')');
        }
        document.getElementById('password').setAttribute('aria-invalid','true');
        btn.disabled = false;
        btn.textContent = KlyxI18n.t('login_btn');
        return;
      }

      /* Success */
      _attempts = 0;
      document.getElementById('email').removeAttribute('aria-invalid');
      document.getElementById('password').removeAttribute('aria-invalid');
      try { localStorage.setItem('klyxCurrentUser', email); } catch(e){}
      window.location.href = 'dashboard.html';

    } catch(err) {
      showErr('حدث خطأ، يرجى المحاولة مجدداً.');
      btn.disabled = false;
      btn.textContent = KlyxI18n.t('login_btn');
    }
  }

  document.addEventListener('DOMContentLoaded', function(){
    /* Redirect if already logged in */
    var currentUser;
    try { currentUser = localStorage.getItem('klyxCurrentUser'); } catch(e){}
    if (currentUser) { window.location.href = 'dashboard.html'; return; }

    KlyxI18n.init();

    /* Lang switcher */
    var lb = document.getElementById('langBar');
    lb.className = 'klyx-lang-switcher';
    ['ar','fr','en'].forEach(function(lang){
      var btn = document.createElement('button'); btn.className = 'lang-btn';
      btn.setAttribute('data-lang', lang);
      btn.textContent = lang === 'ar' ? 'ع' : lang.toUpperCase();
      btn.addEventListener('click', function(){ KlyxI18n.set(lang); });
      btn.classList.toggle('active', lang === KlyxI18n.current);
      lb.appendChild(btn);
    });
    document.addEventListener('klyxLangChanged', function(){
      lb.querySelectorAll('.lang-btn').forEach(function(b){
        b.classList.toggle('active', b.getAttribute('data-lang') === KlyxI18n.current);
      });
    });

    /* Password toggle */
    document.getElementById('pwdToggle').addEventListener('click', function(){
      var inp = document.getElementById('password');
      var show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      this.textContent = show ? '🙈' : '👁';
      this.setAttribute('aria-label', show ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور');
    });

    /* Enter key */
    document.getElementById('password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
    document.getElementById('email').addEventListener('keydown',    function(e){ if(e.key==='Enter') document.getElementById('password').focus(); });

    /* Login button */
    document.getElementById('loginBtn').addEventListener('click', doLogin);

    /* Clear aria-invalid on input */
    ['email','password'].forEach(function(id){
      document.getElementById(id).addEventListener('input', function(){
        this.removeAttribute('aria-invalid');
        clearError();
      });
    });
  });

})();
</script>
</body>
</html>
